<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamar Shood Fast Food</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #121212;
            text-align: center;
            color: #ffffff;
        }
        .bismillah {
            color: #ffcc00;
            font-size: 22px;
            font-weight: bold;
            margin: 20px 0 10px 0;
        }
        .welcome-section {
            background: #1e1e1e;
            border: 1px solid #333333;
            border-radius: 15px 15px 0 0; /* Geesaha sare kaliya ayaa wareegsan */
            padding: 20px;
            margin: 10px auto 0 auto; /* Hoos lagama reebin wax boos ah */
            max-width: 90%;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
        }
        .welcome-title {
            color: #ff3333;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .welcome-text {
            color: #cccccc;
            font-size: 15px;
            line-height: 1.6;
            margin: 0;
        }
        .main-banner {
            width: 90%; /* Waxay la mid tahay ballaca qoraalka dusha sare */
            max-width: 600px;
            height: auto;
            display: block;
            margin: 0 auto; /* Toos ayuu ugu dhegayaa qoraalka hoostiisa */
            border-radius: 0 0 15px 15px; /* Geesaha hoose kaliya ayaa wareegsan */
            box-shadow: 0px 5px 20px rgba(0,0,0,0.6);
        }
    </style>
</head>
<body>

    <!-- 1. Bismillah -->
    <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>

    <!-- 2. Qoraalka Soo Dhaweynta -->
    <div class="welcome-section">
        <div class="welcome-title">✨ Dhadhan Reer Xamar ✨</div>
        <p class="welcome-text">
            Ku soo dhowaada maqaayada Hamar Shood! Waxaan maalin kasta si heersare ah kuugu diyaarinaa cuntooyinka aad jeceshahay oo leh dhadhan gaar ah iyo nadiifnimo buuxda. Booqashadaadu waa noo sharaf!
        </p>
    </div>

    <!-- 3. Boorkaaga oo toos ugu dhegsan qoraalka hoostiisa -->
    <img src="Add a heading_20260623_003800_0000.png" class="main-banner">

</body>
</html>
